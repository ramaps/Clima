<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clima Bandera Pro - Sistema Vivo</title>
</head>
<body style="background: #1a1a1a; display: flex; justify-content: center; padding: 20px; margin: 0;">

<div id="weather-pro">
  <style>
    #weather-pro {
      width: 100%; max-width: 320px; height: 500px;
      border-radius: 25px; padding: 20px; color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      position: relative; overflow: hidden; backdrop-filter: blur(20px);
      border: 1.5px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 20px 40px rgba(0,0,0,0.5); 
      display: flex; flex-direction: column;
      box-sizing: border-box; transition: all 1s ease;
    }

    /* ESTADOS DE FONDO */
    #weather-pro.day { background: linear-gradient(160deg, #56ccf2, #2f80ed); }
    #weather-pro.night { background: linear-gradient(160deg, #0f2027, #203a43, #2c5364); }
    #weather-pro.foggy { background: linear-gradient(160deg, #757f9a, #d7dde8); color: #333; border-color: rgba(0,0,0,0.1); }
    #weather-pro.foggy .min-max-main, #weather-pro.foggy .day-label, #weather-pro.foggy #date, #weather-pro.foggy .alert-stable { color: #444; }
    #weather-pro.foggy svg { fill: #444; }

    /* LUNA ANIMADA */
    .moon {
      width: 35px; height: 35px; background: transparent; border-radius: 50%;
      box-shadow: 9px 9px 0 0 #f1f1f1; transform: rotate(-20deg) translateX(-8px);
      margin-bottom: 10px;
    }

    /* EFECTO RAYO (FLASH) */
    .lightning-flash {
      position: absolute; inset: 0; background: rgba(255,255,255,0.3);
      opacity: 0; pointer-events: none; z-index: 10;
    }
    @keyframes flashScreen {
      0%, 92%, 100% { opacity: 0; }
      94%, 97% { opacity: 0.7; }
    }

    /* PARTÍCULAS (LLUVIA, NIEBLA, ESTRELLAS) */
    .particles {
      position: absolute; top: 0; left: 0; width: 100%; height: 350px;
      overflow: hidden; z-index: 1; pointer-events: none;
    }
    .particles span { position: absolute; opacity: 0.5; background: white; border-radius: 50%; }

    @keyframes floatUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(-200px); opacity: 0.5; } }
    @keyframes dropDown { from { transform: translateY(-20px); } to { transform: translateY(400px); } }

    .current { text-align: center; z-index: 2; position: relative; flex: 1; }
    .temp-main { font-size: 50px; font-weight: 700; margin: 5px 0; }
    .min-max-main { font-size: 14px; opacity: 0.9; margin-bottom: 8px; }
    
    /* VIENTO */
    .wind-info { display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 13px; font-weight: 600; }
    .wind-arrow { width: 14px; height: 14px; fill: white; transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1); }

    /* ALERTAS */
    #alert-box { font-size: 10px; font-weight: 800; text-transform: uppercase; margin-top: 8px; letter-spacing: 0.5px; transition: color 0.5s; }
    .alert-active { color: #ffeb3b; animation: pulseAlert 2s infinite; text-shadow: 0 0 5px rgba(0,0,0,0.3); }
    .alert-stable { color: rgba(255,255,255,0.4); }
    @keyframes pulseAlert { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

    /* PRONÓSTICO SEMANAL */
    .week { 
      display: flex; justify-content: space-between; margin-top: auto; 
      padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.2); 
      z-index: 2; position: relative;
    }
    .day-col { display: flex; flex-direction: column; align-items: center; flex: 1; gap: 2px; }
    .icon-box { height: 45px; width: 45px; display: flex; align-items: center; justify-content: center; position: relative; transform: scale(0.85); }

    .sun { width: 38px; height: 38px; background: radial-gradient(circle, #fff176, #fbc02d); border-radius: 50%; box-shadow: 0 0 20px rgba(255,255,0,0.5); animation: sunPulse 5s infinite; }
    @keyframes sunPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }

    .cloud { width: 40px; height: 22px; background: white; border-radius: 20px; position: relative; z-index: 3; }
    .cloud::before { content: ""; position: absolute; width: 22px; height: 22px; background: white; border-radius: 50%; top: -10px; left: 6px; }

    /* GOTAS DE LLUVIA EN ICONO */
    .rain-container { position: absolute; top: 28px; left: 50%; transform: translateX(-50%); width: 34px; display: flex; justify-content: space-between; z-index: 2; }
    .rain-drop { width: 2px; height: 8px; background: #aeefff; border-radius: 2px; animation: rainAnimate 0.8s linear infinite; }
    @keyframes rainAnimate { from { transform: translateY(0); opacity: 1; } to { transform: translateY(18px); opacity: 0; } }

    /* RAYO EN ICONO */
    .bolt-svg { position: absolute; top: 16px; left: 50%; transform: translateX(-50%); width: 16px; height: 20px; fill: #ffeb3b; opacity: 0; animation: lightningFlash 3s infinite; z-index: 4; filter: drop-shadow(0 0 4px yellow); }
    @keyframes lightningFlash { 0%,92%,100% { opacity: 0; } 94%, 97% { opacity: 1; } }

    .day-label { font-size: 10px; font-weight: 700; opacity: 0.8; text-transform: uppercase; }
    .temp-label-mm { font-size: 10px; font-weight: 600; margin-top: 2px; }
  </style>

  <div class="lightning-flash" id="flash"></div>
  <div class="particles" id="particles"></div>

  <div class="current">
    <h3 style="margin:0; font-size: 18px;">Bandera, Sgo. del Estero</h3>
    <p id="date" style="font-size: 11px; opacity: 0.7; height: 14px;"></p>
    <div id="main-icon" style="display:flex; justify-content:center; transform: scale(1.5); margin: 25px 0;"></div>
    <div class="temp-main" id="temp">--°</div>
    <div class="min-max-main" id="min-max">Sincronizando...</div>
    
    <div class="wind-info">
      <svg class="wind-arrow" id="wind-dir" viewBox="0 0 24 24"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg>
      <span id="wind-speed">-- km/h</span>
      <span id="wind-cardinal" style="opacity: 0.8; font-size: 11px;">--</span>
    </div>
    
    <div id="alert-box" class="alert-stable">Condiciones estables</div>
  </div>

  <div class="week" id="week"></div>

  <script>
    (function(){
      const lat = -28.8833, lon = -62.2667;
      const days = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];

      function getCardinal(angle) {
        const directions = ["N", "NE", "E", "SE", "S", "SO", "O", "NO"];
        return directions[Math.round(angle / 45) % 8];
      }

      function getIconHtml(code, isNight){
        const rain = `<div class="rain-container"><div class="rain-drop" style="animation-delay:0.1s"></div><div class="rain-drop" style="animation-delay:0.3s"></div><div class="rain-drop" style="animation-delay:0.5s"></div></div>`;
        const bolt = `<svg class="bolt-svg" viewBox="0 0 24 24"><path d="M7 2v11h3v9l7-12h-4l4-8z"/></svg>`;

        if(code === 0) {
          return isNight ? `<div class="icon-box"><div class="moon"></div></div>` : `<div class="icon-box"><div class="sun"></div></div>`;
        }
        if(code >= 95) return `<div class="icon-box"><div class="cloud" ${isNight?'style="background:#ccc"':''}></div>${rain}${bolt}</div>`;
        if(code >= 51) return `<div class="icon-box"><div class="cloud" ${isNight?'style="background:#ccc"':''}></div>${rain}</div>`;
        return `<div class="icon-box"><div class="cloud" ${isNight?'style="background:#ccc"':''}></div></div>`;
      }

      async function updateWeather(){
        try {
          const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=auto`);
          const data = await res.json();
          const c = data.current_weather;
          const h = new Date().getHours();
          const isNight = h < 6 || h >= 19;

          // 1. Datos Básicos
          document.getElementById("temp").innerText = Math.round(c.temperature) + "°";
          document.getElementById("min-max").innerText = `Mín: ${Math.round(data.daily.temperature_2m_min[0])}° • Máx: ${Math.round(data.daily.temperature_2m_max[0])}°`;
          
          // 2. Viento Intuitivo (Suma 180° para marcar hacia donde va)
          document.getElementById("wind-speed").innerText = Math.round(c.windspeed) + " km/h";
          document.getElementById("wind-cardinal").innerText = `(${getCardinal(c.winddirection)})`;
          document.getElementById("wind-dir").style.transform = `rotate(${(c.winddirection + 180) % 360}deg)`;
          
          // 3. Icono Principal
          document.getElementById("main-icon").innerHTML = getIconHtml(c.weathercode, isNight);

          // 4. Lógica de Alertas
          const alertBox = document.getElementById("alert-box");
          let isA = false;
          if(c.weathercode >= 95) { alertBox.innerText = "⚠ Alerta: Tormenta"; isA = true; }
          else if(c.windspeed > 50) { alertBox.innerText = "⚠ Alerta: Viento Fuerte"; isA = true; }
          else if(c.temperature > 40) { alertBox.innerText = "⚠ Alerta: Calor Extremo"; isA = true; }
          else if(c.temperature < 0) { alertBox.innerText = "⚠ Alerta: Helada"; isA = true; }
          else { alertBox.innerText = "Condiciones estables"; }
          alertBox.className = isA ? "alert-active" : "alert-stable";

          // 5. Fondos Dinámicos
          const card = document.getElementById("weather-pro");
          card.classList.remove('day', 'night', 'foggy');
          if(c.weathercode === 45 || c.weathercode === 48) card.classList.add('foggy');
          else card.classList.add(isNight ? 'night' : 'day');

          // 6. Partículas Sensoriales (Lluvia, Niebla o Brillo)
          const pCont = document.getElementById("particles");
          pCont.innerHTML = "";
          for(let i=0; i<25; i++){
            let s = document.createElement("span");
            s.style.left = Math.random()*100+"%";
            if(c.weathercode >= 51){ // Lluvia activa
              s.style.width="1px"; s.style.height="15px"; s.style.background="#aeefff";
              s.style.top="-20px"; s.style.animation = `dropDown ${Math.random()*0.5+0.5}s linear infinite`;
            } else if(c.weathercode === 45 || c.weathercode === 48) { // Niebla activa
              s.style.width="4px"; s.style.height="4px"; s.style.background="white"; s.style.filter="blur(1px)";
              s.style.animation = `floatUp ${Math.random()*8+10}s linear infinite`;
            } else { // Estrellas o Brillo solar
              s.style.width="2px"; s.style.height="2px"; s.style.top=Math.random()*100+"%";
              s.style.animation = `floatUp ${Math.random()*3+5}s linear infinite`;
            }
            pCont.appendChild(s);
          }

          // 7. Rayos Activos
          document.getElementById("flash").style.animation = (c.weathercode >= 95) ? "flashScreen 3s infinite" : "none";

          // 8. Pronóstico Semanal
          const week = document.getElementById("week");
          week.innerHTML = "";
          for(let i=0; i<6; i++){
            const d = new Date(); d.setDate(d.getDate()+i);
            const col = document.createElement("div");
            col.className = "day-col";
            col.innerHTML = `
              <span class="day-label">${i===0?"Hoy":days[d.getDay()]}</span>
              ${getIconHtml(data.daily.weathercode[i], false)}
              <span class="temp-label-mm">${Math.round(data.daily.temperature_2m_min[i])}°/${Math.round(data.daily.temperature_2m_max[i])}°</span>
            `;
            week.appendChild(col);
          }
        } catch(e){ console.error("Error al sincronizar:", e); }
      }

      function init(){
        setInterval(() => {
          document.getElementById("date").innerText = new Date().toLocaleString('es-AR', {
            day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit', second:'2-digit'
          });
        }, 1000);
        updateWeather();
        setInterval(updateWeather, 60000);
      }
      init();
    })();
  </script>
</div>
</body>
</html>
