<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clima Bandera Pro - Viento Intuitivo</title>
</head>
<body style="background: #1a1a1a; display: flex; justify-content: center; padding: 20px; margin: 0;">

<div id="weather-pro">
  <style>
    #weather-pro {
      width: 100%; max-width: 320px; height: 500px;
      border-radius: 25px; padding: 20px; color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      position: relative; overflow: hidden; backdrop-filter: blur(20px);
      border: 1.5px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 20px 40px rgba(0,0,0,0.5); 
      display: flex; flex-direction: column;
      box-sizing: border-box; transition: all 1s ease;
    }

    #weather-pro.day { background: linear-gradient(160deg, #56ccf2, #2f80ed); }
    #weather-pro.night { background: linear-gradient(160deg, #0f2027, #203a43, #2c5364); }
    #weather-pro.foggy { background: linear-gradient(160deg, #757f9a, #d7dde8); color: #333; border-color: rgba(0,0,0,0.1); }
    #weather-pro.foggy .min-max-main, #weather-pro.foggy .day-label, #weather-pro.foggy #date, #weather-pro.foggy .alert-stable { color: #444; }
    #weather-pro.foggy svg { fill: #444; }

    .moon {
      width: 35px; height: 35px; background: transparent; border-radius: 50%;
      box-shadow: 9px 9px 0 0 #f1f1f1; transform: rotate(-20deg) translateX(-8px);
      margin-bottom: 10px;
    }

    .particles { position: absolute; top: 0; left: 0; width: 100%; height: 350px; overflow: hidden; z-index: 1; pointer-events: none; }
    .particles span { position: absolute; opacity: 0.5; background: white; border-radius: 50%; }

    @keyframes floatUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(-200px); opacity: 0.5; } }
    @keyframes dropDown { from { transform: translateY(-20px); } to { transform: translateY(400px); } }

    .current { text-align: center; z-index: 2; position: relative; flex: 1; }
    .temp-main { font-size: 50px; font-weight: 700; margin: 5px 0; }
    .min-max-main { font-size: 14px; opacity: 0.9; margin-bottom: 8px; }
    
    .wind-info { display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 13px; font-weight: 600; }
    /* La flecha ahora tiene una transición suave para cuando cambie el viento */
    .wind-arrow { width: 14px; height: 14px; fill: white; transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1); }

    #alert-box { font-size: 10px; font-weight: 800; text-transform: uppercase; margin-top: 8px; letter-spacing: 0.5px; }
    .alert-active { color: #ffeb3b; animation: pulseAlert 2s infinite; text-shadow: 0 0 5px rgba(0,0,0,0.3); }
    .alert-stable { color: rgba(255,255,255,0.4); }

    .week { display: flex; justify-content: space-between; margin-top: auto; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.2); z-index: 2; position: relative; }
    .day-col { display: flex; flex-direction: column; align-items: center; flex: 1; gap: 2px; }
    .icon-box { height: 45px; width: 45px; display: flex; align-items: center; justify-content: center; position: relative; transform: scale(0.85); }

    .sun { width: 38px; height: 38px; background: radial-gradient(circle, #fff176, #fbc02d); border-radius: 50%; box-shadow: 0 0 20px rgba(255,255,0,0.5); }
    .cloud { width: 40px; height: 22px; background: white; border-radius: 20px; position: relative; z-index: 3; }
    .cloud::before { content: ""; position: absolute; width: 22px; height: 22px; background: white; border-radius: 50%; top: -10px; left: 6px; }
    
    .day-label { font-size: 10px; font-weight: 700; opacity: 0.8; text-transform: uppercase; }
    .temp-label-mm { font-size: 10px; font-weight: 600; margin-top: 2px; }
  </style>

  <div class="particles" id="particles"></div>

  <div class="current">
    <h3 style="margin:0; font-size: 18px;">Bandera, Sgo. del Estero</h3>
    <p id="date" style="font-size: 11px; opacity: 0.7; height: 14px;"></p>
    <div id="main-icon" style="display:flex; justify-content:center; transform: scale(1.5); margin: 25px 0;"></div>
    <div class="temp-main" id="temp">--°</div>
    <div class="min-max-main" id="min-max">Sincronizando...</div>
    
    <div class="wind-info">
      <svg class="wind-arrow" id="wind-dir" viewBox="0 0 24 24"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg>
      <span id="wind-speed">-- km/h</span>
      <span id="wind-cardinal" style="opacity: 0.8; font-size: 11px;">--</span>
    </div>
    
    <div id="alert-box" class="alert-stable">Condiciones estables</div>
  </div>

  <div class="week" id="week"></div>

  <script>
    (function(){
      const lat = -28.8833, lon = -62.2667;
      const days = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];

      function getCardinal(angle) {
        // Mantenemos la lógica de "de donde viene" para el texto (ej: "Viento Sur")
        const directions = ["N", "NE", "E", "SE", "S", "SO", "O", "NO"];
        return directions[Math.round(angle / 45) % 8];
      }

      function getIconHtml(code, isNight){
        if(code === 0) return isNight ? `<div class="icon-box"><div class="moon"></div></div>` : `<div class="icon-box"><div class="sun"></div></div>`;
        return `<div class="icon-box"><div class="cloud" ${isNight?'style="background:#ccc"':''}></div></div>`;
      }

      async function updateWeather(){
        try {
          const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=auto`);
          const data = await res.json();
          const c = data.current_weather;
          const h = new Date().getHours();
          const isNight = h < 6 || h >= 19;

          document.getElementById("temp").innerText = Math.round(c.temperature) + "°";
          document.getElementById("min-max").innerText = `Mín: ${Math.round(data.daily.temperature_2m_min[0])}° • Máx: ${Math.round(data.daily.temperature_2m_max[0])}°`;
          
          // --- LÓGICA DE VIENTO INTUITIVA ---
          document.getElementById("wind-speed").innerText = Math.round(c.windspeed) + " km/h";
          document.getElementById("wind-cardinal").innerText = `(${getCardinal(c.winddirection)})`;
          
          // Sumamos 180 para que la punta de la flecha marque "hacia donde va"
          const haciaDondeVa = (c.winddirection + 180) % 360;
          document.getElementById("wind-dir").style.transform = `rotate(${haciaDondeVa}deg)`;

          document.getElementById("main-icon").innerHTML = getIconHtml(c.weathercode, isNight);

          const alertBox = document.getElementById("alert-box");
          let isA = (c.windspeed > 50 || c.temperature > 40 || c.temperature < 0);
          alertBox.innerText = isA ? "⚠ Alerta Meteorológica" : "Condiciones estables";
          alertBox.className = isA ? "alert-active" : "alert-stable";

          const card = document.getElementById("weather-pro");
          card.classList.remove('day', 'night', 'foggy');
          if(c.weathercode === 45 || c.weathercode === 48) card.classList.add('foggy');
          else card.classList.add(isNight ? 'night' : 'day');

          const week = document.getElementById("week");
          week.innerHTML = "";
          for(let i=0; i<6; i++){
            const d = new Date(); d.setDate(d.getDate()+i);
            const col = document.createElement("div");
            col.className = "day-col";
            col.innerHTML = `<span class="day-label">${i===0?"Hoy":days[d.getDay()]}</span>${getIconHtml(data.daily.weathercode[i], false)}<span class="temp-label-mm">${Math.round(data.daily.temperature_2m_min[i])}°/${Math.round(data.daily.temperature_2m_max[i])}°</span>`;
            week.appendChild(col);
          }
        } catch(e){ console.error(e); }
      }

      setInterval(() => {
        document.getElementById("date").innerText = new Date().toLocaleString('es-AR', {
          day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit', second:'2-digit'
        });
      }, 1000);
      updateWeather();
      setInterval(updateWeather, 60000);
    })();
  </script>
</div>
</body>
</html>
